<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS 2037 | Neural Social Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Dynamic Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    
    <div class="interface-container">
        <!-- Holographic Navigation -->
        <nav class="holo-nav">
            <div class="nav-logo">
                <div class="logo-orb"></div>
                <span>NEXUS</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tooltip="Neural Feed">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3"/></svg>
                </li>
                <li data-tooltip="Digital Twins">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </li>
                <li data-tooltip="Memory Bank">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 7h10v10H7z" fill="currentColor"/></svg>
                </li>
                <li data-tooltip="Quantum Chat">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </li>
            </ul>
            <div class="nav-bottom">
                <div class="user-holo-avatar">
                    <div class="avatar-ring"></div>
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Aris" alt="User">
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content-area">
            <header class="neuro-header">
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span>NEURAL LINK ACTIVE // 98.4% SYNC</span>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search memory banks...">
                    <div class="search-glow"></div>
                </div>
            </header>

            <div class="feed-container" id="feed"></div>
        </main>

        <!-- Context Panel -->
        <aside class="context-panel">
            <div class="panel-card">
                <h3>Live Metrics</h3>
                <div class="metric-row">
                    <span>Global Sync</span>
                    <div class="bar-container"><div class="bar-fill" style="width: 85%"></div></div>
                </div>
                <div class="metric-row">
                    <span>Empathy Flux</span>
                    <div class="bar-container"><div class="bar-fill" style="width: 62%"></div></div>
                </div>
                <div class="metric-row">
                    <span>Data Stream</span>
                    <div class="bar-container"><div class="bar-fill" style="width: 94%"></div></div>
                </div>
            </div>

            <div class="panel-card trending">
                <h3>Trending Consciousness</h3>
                <ul class="trend-list">
                    <li>#MarsColonyLife <span>+24k</span></li>
                    <li>#NeuralArt <span>+18k</span></li>
                    <li>#QuantumEthics <span>+12k</span></li>
                    <li>#SyntheticDreams <span>+9k</span></li>
                </ul>
            </div>
        </aside>
    </div>

    <!-- Floating Action Button -->
    <button class="fab-compose" onclick="toggleComposer()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>

    <!-- Composer Modal -->
    <div class="composer-modal" id="composer">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Transmit Thought</h2>
                <button onclick="toggleComposer()">×</button>
            </div>
            <textarea id="postInput" placeholder="Project your thoughts directly to the network..."></textarea>
            
            <div class="emotion-selector">
                <label>Attach Emotion Packet:</label>
                <div class="emotion-chips">
                    <button class="chip active" data-emotion="neutral">Neutral</button>
                    <button class="chip" data-emotion="joy">Joy</button>
                    <button class="chip" data-emotion="melancholy">Melancholy</button>
                    <button class="chip" data-emotion="excitement">Excitement</button>
                    <button class="chip" data-emotion="focus">Focus</button>
                </div>
            </div>

            <div class="modal-footer">
                <div class="privacy-toggle">
                    <span>Public</span>
                    <div class="toggle-switch"></div>
                    <span>Encrypted Pod</span>
                </div>
                <button class="btn-transmit" onclick="createPost()">TRANSMIT</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
